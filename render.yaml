databases:
  - name: inventory
    databaseName: inventory
    user: inventory

services:
  - type: web
    name: inventory
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn inventory.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4